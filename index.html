<!DOCTYPE html>
<html>
<head>
    <title>CANdyBox</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #ffffff;
            color: #000000;
        }

        /* Top-right logo */
        .top-right {
            position: absolute;
            top: 20px;
            left: 20px;
        }

        .top-right img {
            width: 60px;
        }

        /* Center content */
        .center {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .center img {
            width: 400px;
            max-width: 80%;
        }

        .tagline {
            margin-top: 20px;
            font-size: 18px;
            color: #555;
        }
    </style>
</head>

<body>

    <!-- Top-left logo -->
    <div class="top-left">
        <img src="Schilling_logo.png" alt="CANdyBox">
    </div>

    <!-- Centered content -->
    <div class="center">
        <img src="CANdyBox_logo.png" alt="CANdyBox">
        <div class="tagline">
            AI-driven CAN & I/O controller for automotive systems
        </div>
    </div>

</body>
</html>
